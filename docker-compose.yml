version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: tgdrive-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: telegram_drive
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tgdrive-network

  # Redis for Queue & Caching
  redis:
    image: redis:7-alpine
    container_name: tgdrive-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tgdrive-network

  # Backend API
  api:
    build:
      context: .
      target: api
    container_name: tgdrive-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/telegram_drive
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "4000:4000"
    volumes:
      - tgdrive-sessions:/app/data/sessions
      - tgdrive-uploads:/app/data/uploads
    networks:
      - tgdrive-network

  # Frontend Web
  web:
    build:
      context: .
      target: web
    container_name: tgdrive-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: ${API_URL:-http://api:4000}
    ports:
      - "3000:3000"
    networks:
      - tgdrive-network

  # Background Worker
  worker:
    build:
      context: .
      target: worker
    container_name: tgdrive-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/telegram_drive
      REDIS_URL: redis://redis:6379
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      BULLMQ_CONCURRENCY: ${BULLMQ_CONCURRENCY:-5}
    volumes:
      - tgdrive-sessions:/app/data/sessions
      - tgdrive-uploads:/app/data/uploads
    networks:
      - tgdrive-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: tgdrive-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - api
      - web
    networks:
      - tgdrive-network

volumes:
  postgres-data:
  redis-data:
  tgdrive-sessions:
  tgdrive-uploads:

networks:
  tgdrive-network:
    driver: bridge
