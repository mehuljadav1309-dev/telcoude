# =============================================================================
# Telegram Drive - Development Override
# =============================================================================
# Usage: docker compose -f docker-compose.yml -f docker-compose.override.yml up
# Or just: docker compose up (auto-detects override)
# =============================================================================

version: '3.8'

services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      target: api
      dockerfile: Dockerfile.dev
    ports:
      - "4000:4000"
      - "9229:9229" # Node.js debugger
    volumes:
      - ./apps/api/src:/app/apps/api/src:ro
      - ./apps/api/test:/app/apps/api/test:ro
      - ./packages:/app/packages:ro
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
      CORS_ORIGINS: http://localhost:3000,http://localhost:4000
    command: npx nest start --watch --debug 0.0.0.0:9229

  web:
    build:
      context: .
      target: web
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web/src:/app/apps/web/src:ro
      - ./apps/web/public:/app/apps/web/public:ro
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:4000
    command: npx next dev

  worker:
    environment:
      NODE_ENV: development
      BULLMQ_CONCURRENCY: 2
    command: npx ts-node src/main.ts

  nginx:
    ports:
      - "80:80"
    volumes:
      - ./nginx/development.conf:/etc/nginx/conf.d/default.conf:ro

  pgadmin:
    profiles:
      - dev
    ports:
      - "5050:80"

  redis-commander:
    profiles:
      - dev
    ports:
      - "8081:8081"
